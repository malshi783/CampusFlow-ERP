<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University ERP - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary-green: #005a3c;
            --accent-green: #008055;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --text-main: #333333;
            --border-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ප්‍රධාන මට්ටමේ Flex බොක්ස් එක (Login Container) */
        .login-wrapper {
            display: flex;
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
        }

        /* වම්පස ඇති නිල්/කොළ පැහැති තීරුව (Banner Section) */
        .login-banner {
            flex: 1;
            background-color: var(--primary-green);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .login-banner i {
            font-size: 80px;
            margin-bottom: 20px;
            color: #00ffaa;
        }

        .login-banner h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .login-banner p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
        }

        /* දකුණුපස පෝරමය අඩංගු කොටස (Form Section) */
        .login-form-section {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-section h1 {
            font-size: 36px;
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        .login-form-section .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-green);
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            background-color: #fafafa;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-green);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 90, 60, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-options a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background-color: var(--accent-green);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #888;
            font-size: 13px;
            position: relative;
        }

        /* ගූගල් බොත්තම මැදට තබාගන්නා කොටස */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }
            .login-banner {
                padding: 30px;
            }
            .login-form-section {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-banner">
            <i class="fa-solid fa-graduation-cap"></i>
            <h2>Welcome!</h2>
            <p><b>University ERP Management System<br>Easily manage students, subjects, attendance, and grades.</b></p>
        </div>

        <div class="login-form-section">
            <h1>Sign In</h1>
            <p class="subtitle">Enter your credentials to access the system</p>

            <form id="loginForm" action="dashboard.html" method="GET">
                <div class="form-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="divider">or</div>

            <div class="google-btn-wrapper">
                <div id="googleBtnContainer"></div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            // Google API සක්‍රීය කිරීම
            google.accounts.id.initialize({
                client_id: "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });

            // ඔබේ UI එකේ පළලට ගැළපෙන පරිදි බොත්තම නිර්මාණය
            google.accounts.id.renderButton(
                document.getElementById("googleBtnContainer"),
                { 
                    theme: "outline", 
                    size: "large", 
                    width: "320", 
                    text: "signin_with",
                    shape: "rectangular"
                }
            );
        };

        function handleCredentialResponse(response) {
            // සාර්ථක ලොගින් වීමකදී ලැබෙන දත්ත ක්‍රියාවලිය
            const responsePayload = parseJwt(response.credential);
            alert(`සාර්ථකව සම්බන්ධ විය, ${responsePayload.name}!`);
            window.location.href = "dashboard.html";
        }

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
