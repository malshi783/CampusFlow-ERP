<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University ERP - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary-green: #004d33; --accent-green: #008055; --bg-light: #f4f7f6; --white: #ffffff; --text-main: #333333; --border-color: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-wrapper { display: flex; background-color: var(--white); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; width: 100%; max-width: 900px; min-height: 520px; }
        .login-banner { flex: 1; background: linear-gradient(135deg, #003322, var(--primary-green)); color: var(--white); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .login-banner i { font-size: 70px; margin-bottom: 20px; color: #00ffaa; }
        .login-banner h2 { font-size: 28px; margin-bottom: 10px; }
        .login-banner p { font-size: 14px; opacity: 0.8; line-height: 1.6; }
        .login-form-section { flex: 1.2; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-form-section h1 { font-size: 32px; color: var(--primary-green); margin-bottom: 5px; }
        .login-form-section .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { position: relative; margin-bottom: 20px; }
        .form-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent-green); }
        .form-group input { width: 100%; padding: 14px 15px 14px 45px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background-color: #fafafa; outline: none; transition: all 0.3s; }
        .form-group input:focus { border-color: var(--primary-green); background-color: var(--white); box-shadow: 0 0 0 3px rgba(0,77,51,0.1); }
        .submit-btn { width: 100%; padding: 14px; background-color: var(--primary-green); color: var(--white); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .submit-btn:hover { background-color: var(--accent-green); }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-banner">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>Welcome Back!</h2>
        <p>University ERP System Platform.<br>Integrated control of registries, streams, schedules, and grading tracks.</p>
    </div>
    <div class="login-form-section">
        <h1>Sign In</h1>
        <p class="subtitle">Enter campus admin access credentials</p>
        <form th:action="@{/dashboard}" method="GET">
            <div class="form-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Username" value="admin" required>
            </div>
            <div class="form-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" value="admin123" required>
            </div>
            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Proceed to Hub
            </button>
        </form>
    </div>
</div>
</body>
</html>
