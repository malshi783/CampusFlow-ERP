<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University ERP - Evaluation Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --primary-dark: #003322; --primary-green: #004d33; --accent-green: #008055; --bg-light: #f4f7f6; --white: #ffffff; --text-main: #333333; --text-muted: #666666; --border-color: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; padding: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background-color: var(--primary-dark); color: var(--white); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; padding: 20px 0; }
        .sidebar .brand { font-size: 22px; font-weight: bold; padding: 10px 25px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .sidebar-menu a { display: block; color: #b3ccc0; text-decoration: none; padding: 12px 25px; font-size: 15px; transition: all 0.3s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background-color: rgba(255,255,255,0.1); color: var(--white); border-left: 4px solid #00ffaa; padding-left: 21px; }
        .sidebar-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { display: block; background-color: #cc3333; color: var(--white); text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; }
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .ui-card { background-color: var(--white); border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); }
        .ui-card h2 { margin: 0 0 20px 0; font-size: 18px; color: var(--primary-green); border-bottom: 2px solid var(--bg-light); padding-bottom: 10px; }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; }
        .data-table th { background-color: #f8faf9; color: var(--text-muted); padding: 12px 14px; border-bottom: 2px solid var(--border-color); }
        .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .input-mark { width: 80px; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; }
        .submit-btn { background-color: var(--primary-green); color: var(--white); padding: 12px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; float: right; margin-top: 20px; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="brand"><i class="fa-solid fa-graduation-cap"></i> <span>University ERP</span></div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/student}">Students</a></li>
        <li><a th:href="@{/course-registration}">Courses</a></li>
        <li><a th:href="@{/attendance}">Attendance</a></li>
        <li><a th:href="@{/exams}" class="active">Marks</a></li>
    </ul>
    <div class="sidebar-footer"><a th:href="@{/login}" class="logout-btn">Logout</a></div>
</aside>
<main class="main-content">
    <h1>Examination & Grading Management</h1>
    <div th:if="${param.success}" style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        ✓ GPA Assessment Transcripts Compiled Successfully!
    </div>
    <section class="ui-card">
        <h2>Batch Evaluation Marks Entry</h2>
        <form th:action="@{/exams/save}" method="POST">
            <input type="hidden" name="courseId" value="1">
            <input type="hidden" name="examDate" th:value="${examDate}">
            <table class="data-table">
                <thead><tr><th>Index ID</th><th>Student Identity</th><th>Obtained Marks (0-100)</th></tr></thead>
                <tbody>
                <tr th:each="st : ${students}">
                    <td><span th:text="'STU-' + ${st.studentId}">STU</span><input type="hidden" name="studentIds" th:value="${st.studentId}"></td>
                    <td th:text="${st.firstName} + ' ' + ${st.lastName}">Student</td>
                    <td><input type="number" name="marks" class="input-mark" min="0" max="100" value="75" required></td>
                </tr>
                </tbody>
            </table>
            <button type="submit" class="submit-btn">Commit Grades</button>
        </form>
    </section>
</main>
</body>
</html>
